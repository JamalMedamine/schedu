version: "3.9"

services:
  app:
    build: .  # path to your FastAPI Dockerfile
    container_name: fastapi_app
    command: >
      sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --reload --port 8000"

    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis_cache
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata: